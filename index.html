<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Mitra | RentalinBy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#FF5A00' } } } }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; background-color: #f5f5f7; }
        .tab-content { display: none; animation: fadeIn 0.2s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen font-sans text-gray-900 antialiased p-5">

    <div class="bg-white p-8 rounded-3xl shadow-xl shadow-gray-200/50 border border-gray-100 w-full max-w-sm relative">

        <div class="flex gap-2 mb-6 bg-gray-100 p-1 rounded-xl">
            <button onclick="switchTab('login')" id="tab-login" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-gray-900 transition-all">Masuk</button>
            <button onclick="switchTab('register')" id="tab-register" class="flex-1 py-2 text-sm font-bold rounded-lg text-gray-500 hover:text-gray-700 transition-all">Daftar</button>
        </div>

        <div id="form-login" class="tab-content active">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold tracking-tight">Selamat Datang</h1>
                <p class="text-xs text-gray-500 mt-1">Masuk untuk mengelola garasi Anda.</p>
            </div>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Email Terdaftar</label>
                    <input type="email" id="l-email" required placeholder="admin@rental.com" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand font-medium">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Password</label>
                    <input type="password" id="l-password" required placeholder="••••••••" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand font-medium">
                </div>
                <button type="submit" id="btn-login" class="w-full bg-black text-white font-bold py-3.5 rounded-xl active:scale-95 transition-all shadow-md mt-2">Masuk ke Dashboard</button>
            </form>
        </div>

        <div id="form-register" class="tab-content">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold tracking-tight">Buka Cabang Baru</h1>
                <p class="text-xs text-gray-500 mt-1">Gratis uji coba <b>Paket Pemula (5 Armada)</b> selama 14 Hari.</p>
            </div>
            <form onsubmit="handleRegister(event)" class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Nama Rental</label>
                    <input type="text" id="r-nama" required oninput="autoGenerateTenant(this)" placeholder="Contoh: Budi Motor" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand font-medium">
                    <p class="text-[10px] text-gray-400 mt-1.5 ml-1 leading-tight">Link customer otomatis:<br><span class="text-gray-600 font-medium">.../customer-test.html?tenant=</span><span id="preview-tenant" class="font-bold text-brand">...</span></p>
                </div>

                <div class="pt-2 border-t border-gray-100"></div>

                <input type="tel" id="r-wa" required placeholder="No. WA Admin (Contoh: 0812...)" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand font-medium">
                <input type="email" id="r-email" required placeholder="Alamat Email" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand font-medium">
                
                <div>
                    <input type="password" id="r-password" required minlength="7" oninput="checkPasswordLength(this)" placeholder="Buat Password (Min. 7 karakter)" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand font-medium transition-colors">
                    <p id="password-warn" class="text-[10px] text-red-500 mt-1.5 ml-1 hidden font-bold">⚠️ Password terlalu pendek (Minimal 7 karakter)</p>
                </div>
                
                <button type="submit" id="btn-register" class="w-full bg-brand text-white font-bold py-3.5 rounded-xl active:scale-95 transition-all shadow-md shadow-brand/20 mt-2">Mulai 14 Hari Gratis</button>
            </form>
        </div>

        <div id="alert-msg" class="hidden mt-4 text-center text-xs font-bold p-3 rounded-xl"></div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/beuna-vr-api';
        let globalGeneratedTenantId = '';

        function switchTab(tab) {
            document.getElementById('form-login').classList.toggle('active', tab === 'login');
            document.getElementById('form-register').classList.toggle('active', tab === 'register');
            
            document.getElementById('tab-login').className = tab === 'login' ? "flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-gray-900 transition-all" : "flex-1 py-2 text-sm font-bold rounded-lg text-gray-500 hover:text-gray-700 transition-all";
            document.getElementById('tab-register').className = tab === 'register' ? "flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-gray-900 transition-all" : "flex-1 py-2 text-sm font-bold rounded-lg text-gray-500 hover:text-gray-700 transition-all";
            
            document.getElementById('alert-msg').classList.add('hidden');
        }

        // GENERATOR ID OTOMATIS
        function autoGenerateTenant(input) {
            let val = input.value.toLowerCase().replace(/[^a-z0-9]/g, '');
            globalGeneratedTenantId = val;
            document.getElementById('preview-tenant').innerText = val || '...';
        }

        // VALIDASI PASSWORD REAL-TIME
        function checkPasswordLength(input) {
            const warn = document.getElementById('password-warn');
            if (input.value.length > 0 && input.value.length < 7) {
                warn.classList.remove('hidden');
                input.classList.add('border-red-400', 'bg-red-50');
            } else {
                warn.classList.add('hidden');
                input.classList.remove('border-red-400', 'bg-red-50');
            }
        }

        function showAlert(msg, isError = false) {
            const el = document.getElementById('alert-msg');
            el.innerText = msg;
            el.className = `mt-4 text-center text-xs font-bold p-3 rounded-xl block ${isError ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-green-50 text-green-600 border border-green-200'}`;
        }

        // FUNGSI LOGIN (Patokan Murni Email & Password)
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.innerHTML = 'Memeriksa...'; btn.disabled = true;
            
            const payload = {
                action: 'login_tenant',
                email: document.getElementById('l-email').value.trim(),
                password: document.getElementById('l-password').value
            };

            try {
                const res = await fetch(WEBHOOK_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload) 
                });
                
                let d = await res.json();
                d = Array.isArray(d) ? d[0] : d; 
                if (d && d.json) d = d.json;

                if (d && d.tenant_id) { 
                    window.location.href = 'owner-test.html?tenant=' + d.tenant_id;
                } else if (Array.isArray(d) && d.length > 0 && d[0].tenant_id) {
                    window.location.href = 'owner-test.html?tenant=' + d[0].tenant_id;
                } else {
                    showAlert('Email atau Password salah!', true);
                }
            } catch (err) {
                showAlert('Gagal terhubung ke server.', true);
            } finally {
                btn.innerHTML = 'Masuk ke Dashboard'; btn.disabled = false;
            }
        }

        // FUNGSI DAFTAR TENANT BARU
        async function handleRegister(e) {
            e.preventDefault();
            
            if (!globalGeneratedTenantId) {
                alert("Harap masukkan Nama Rental yang valid.");
                return;
            }

            const password = document.getElementById('r-password').value;
            if (password.length < 7) {
                showAlert('Gagal! Password minimal 7 karakter.', true);
                return;
            }

            const btn = document.getElementById('btn-register');
            btn.innerHTML = 'Memeriksa...'; btn.disabled = true;

            const payload = {
                action: 'register_tenant',
                tenant_id: globalGeneratedTenantId,
                nama_rental: document.getElementById('r-nama').value,
                no_wa_owner: document.getElementById('r-wa').value.replace(/\D/g, ''),
                email: document.getElementById('r-email').value.trim(),
                password: password,
                bio_deskripsi: 'Sewa kendaraan terpercaya', 
                logo_url: '' 
            };

            try {
                const res = await fetch(WEBHOOK_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload) 
                });
                
                let data = await res.json();

                // Parser membaca format data N8N
                data = Array.isArray(data) ? data[0] : data; 
                if (data && data.json) data = data.json;

                // Nangkep Error dari N8N (Bisa karena Email ATAU Nama Rental kembar)
                if (data.status === 'error') {
                    showAlert(data.message, true);
                } else {
                    e.target.reset(); 
                    globalGeneratedTenantId = '';
                    document.getElementById('preview-tenant').innerText = '...';
                    
                    switchTab('login');
                    showAlert('Pendaftaran Berhasil! Silakan Masuk menggunakan akun Anda.');
                }
            } catch (err) {
                showAlert('Gagal terhubung ke server. Coba lagi.', true);
            } finally {
                btn.innerHTML = 'Mulai 14 Hari Gratis'; 
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
