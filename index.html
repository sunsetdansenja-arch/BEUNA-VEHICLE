<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sewa Kendaraan | Link in Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#FF5A00', // Oranye Elektrik
                        'brand-hover': '#e04f00'
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"San Francisco"', '"Segoe UI"', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Sembunyikan scrollbar tapi tetap bisa scroll */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; background-color: #fafafa; }
        
        /* Animasi transisi antar view */
        .view-transition { transition: opacity 0.3s ease, transform 0.3s ease; }
        .view-hidden { opacity: 0; transform: translateY(10px); pointer-events: none; position: absolute; top: 0; left: 0; width: 100%; }
        .view-active { opacity: 1; transform: translateY(0); position: relative; z-index: 10; }
    </style>
</head>
<body class="text-gray-900 antialiased min-h-screen relative overflow-x-hidden">

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-sm border-x border-gray-100 relative">
        
        <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="header-back-btn" class="hidden cursor-pointer p-2 -ml-2 rounded-full hover:bg-gray-100 transition-colors" onclick="showCatalog()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </div>
                <div id="header-profile" class="flex items-center gap-3 animate-pulse">
                    <div class="w-8 h-8 rounded-full bg-gray-200"></div>
                    <div class="h-4 w-24 bg-gray-200 rounded"></div>
                </div>
            </div>
        </header>

        <main class="p-5 pb-24 relative">
            
            <section id="view-catalog" class="view-transition view-active space-y-6">
                <div id="tenant-bio-container" class="animate-pulse">
                    <div class="h-6 w-3/4 bg-gray-200 rounded mb-2"></div>
                    <div class="h-4 w-1/2 bg-gray-200 rounded"></div>
                </div>

                <div id="vehicle-list" class="space-y-4">
                    <div class="flex gap-4 p-4 border border-gray-100 rounded-2xl bg-white shadow-sm animate-pulse">
                        <div class="w-24 h-24 rounded-xl bg-gray-200 shrink-0"></div>
                        <div class="flex-1 flex flex-col justify-between py-1">
                            <div>
                                <div class="h-5 w-3/4 bg-gray-200 rounded mb-2"></div>
                                <div class="h-4 w-1/2 bg-gray-200 rounded"></div>
                            </div>
                            <div class="h-8 w-full bg-gray-200 rounded-full mt-3"></div>
                        </div>
                    </div>
                </div>
            </section>


            <section id="view-form" class="view-transition view-hidden">
                <div id="selected-vehicle-preview" class="mb-6 p-4 rounded-2xl bg-gray-50 border border-gray-100 flex gap-4 items-center">
                </div>

                <h2 class="text-xl font-bold mb-4 tracking-tight">Kapan mau dipakai?</h2>
                <form id="booking-form" class="space-y-5" onsubmit="submitBooking(event)">
                    <input type="hidden" id="form-vehicle-id">
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Mulai</label>
                            <input type="datetime-local" id="waktu_mulai" required class="w-full bg-white border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Selesai</label>
                            <input type="datetime-local" id="waktu_selesai" required class="w-full bg-white border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Alamat Antar (Detailin patokan ya)</label>
                        <textarea id="alamat_antar" rows="2" required placeholder="Cth: Jl. Sudirman No 10 (Pagar Hitam)" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all"></textarea>
                    </div>

                    <div class="border-t border-gray-100 my-2"></div>
                    <h2 class="text-lg font-bold mb-2 tracking-tight">Data Diri</h2>

                    <div>
                        <input type="text" id="nama_lengkap" required placeholder="Nama Lengkap (Sesuai KTP)" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all">
                    </div>
                    <div>
                        <input type="tel" id="no_wa_customer" required placeholder="No. WhatsApp Aktif" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="akun_sosmed" required placeholder="Username IG/TikTok" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all">
                        <input type="text" id="pekerjaan" required placeholder="Pekerjaan / Mahasiswa" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all">
                    </div>

                    <div>
                        <input type="tel" id="no_darurat" required placeholder="No. Darurat (Keluarga/Teman)" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all">
                    </div>

                    <div class="flex items-center justify-between p-4 border border-gray-100 rounded-xl bg-white mt-4">
                        <div class="text-sm font-medium">Butuh Helm Berapa?</div>
                        <div class="flex items-center gap-3">
                            <button type="button" onclick="ubahJumlah('helm', -1)" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center font-bold active:scale-90 transition-transform">-</button>
                            <span id="jumlah_helm_display" class="font-bold w-4 text-center">2</span>
                            <button type="button" onclick="ubahJumlah('helm', 1)" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center font-bold active:scale-90 transition-transform">+</button>
                            <input type="hidden" id="jumlah_helm" value="2">
                        </div>
                    </div>

                    <div class="p-4 bg-orange-50 rounded-xl border border-orange-100 mt-6">
                        <div class="flex items-start gap-3">
                            <svg class="w-5 h-5 text-brand shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            <p class="text-xs text-orange-800 leading-relaxed font-medium">Biar gampang, foto KTP dan dokumen jaminan cukup dikirim lewat WhatsApp aja setelah kamu pencet tombol di bawah.</p>
                        </div>
                    </div>

                    <div class="fixed bottom-0 left-0 right-0 p-5 bg-white/90 backdrop-blur-md border-t border-gray-100 max-w-md mx-auto z-40">
                        <button type="submit" id="btn-submit" class="w-full bg-brand hover:bg-brand-hover text-white font-bold py-3.5 rounded-full shadow-lg shadow-orange-500/30 active:scale-95 transition-all flex justify-center items-center gap-2">
                            <span>Lanjut ke WhatsApp</span>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                </form>
            </section>

        </main>
    </div>

    <script>
        // URL Production n8n yang udah bener
        const WEBHOOK_URL = 'https://n8n.beuna.web.id/webhook/beuna-vr-api-endpoint';
        
        // Logika dinamis untuk Vercel Wildcard Subdomain
        const SUBDOMAIN = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'sewasukabumi' // Fallback aman buat testing di komputer lu
            : window.location.hostname.split('.')[0]; // Otomatis ngambil nama rental dari URL

        let globalTenant = {};
        let globalVehicles = [];

        async function init() {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'get', subdomain: SUBDOMAIN })
                });
                
                const resData = await response.json();
                
                if(resData.status === 'success') {
                    globalTenant = resData.data.tenant;
                    globalVehicles = resData.data.vehicles;
                    
                    renderHeader();
                    renderCatalog();
                }
            } catch (error) {
                console.error("Gagal load data:", error);
                document.getElementById('vehicle-list').innerHTML = `
                    <div class="text-center p-6 bg-red-50 rounded-xl text-red-600 text-sm font-medium border border-red-100">
                        Waduh, gagal narik data garasi. Pastikan workflow n8n udah aktif.
                    </div>`;
            }
        }

        function renderHeader() {
            if(!globalTenant) return;
            
            document.getElementById('header-profile').classList.remove('animate-pulse');
            document.getElementById('header-profile').innerHTML = `
                <img src="${globalTenant.logo_url || 'https://ui-avatars.com/api/?name='+globalTenant.nama_rental}" class="w-8 h-8 rounded-full border border-gray-200 object-cover">
                <span class="font-bold text-[15px] tracking-tight">${globalTenant.nama_rental}</span>
            `;

            document.getElementById('tenant-bio-container').classList.remove('animate-pulse');
            document.getElementById('tenant-bio-container').innerHTML = `
                <h1 class="text-2xl font-bold tracking-tight mb-1">Pilih Kendaraan</h1>
                <p class="text-sm text-gray-500 leading-relaxed">${globalTenant.bio_deskripsi || 'Sewa motor cepat, aman, dan terpercaya.'}</p>
            `;
        }

        function renderCatalog() {
            const listContainer = document.getElementById('vehicle-list');
            listContainer.innerHTML = '';

            if (globalVehicles.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-sm text-gray-400 py-10">Belum ada kendaraan yang terdaftar.</p>`;
                return;
            }

            globalVehicles.forEach(v => {
                const hargaFormat = new Intl.NumberFormat('id-ID', { maximumFractionDigits: 0 }).format(v.harga_per_hari);
                const isAvailable = v.is_available === true || v.is_available === "true";
                
                const card = document.createElement('div');
                card.className = `p-3 flex gap-4 border border-gray-200 rounded-2xl bg-white shadow-sm transition-all active:scale-[0.98] ${!isAvailable ? 'opacity-50 grayscale' : 'cursor-pointer hover:border-gray-300'}`;
                
                if(isAvailable) {
                    card.onclick = () => selectVehicle(v.vehicle_id);
                }

                card.innerHTML = `
                    <div class="w-[100px] h-[100px] rounded-[10px] overflow-hidden shrink-0 bg-gray-50 border border-gray-100">
                        <img src="${v.foto_url || 'https://placehold.co/200x200?text=No+Image'}" alt="${v.nama_kendaraan}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 flex flex-col justify-between py-1 pr-1">
                        <div>
                            <h3 class="font-bold text-[15px] leading-tight text-gray-900 line-clamp-2">${v.nama_kendaraan}</h3>
                            <p class="text-brand font-bold text-sm mt-1">Rp${hargaFormat} <span class="text-xs font-normal text-gray-400">/hari</span></p>
                        </div>
                        <div class="mt-2">
                            ${isAvailable 
                                ? `<button class="text-[11px] font-bold bg-black text-white px-4 py-1.5 rounded-full inline-flex items-center gap-1">Pilih <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>` 
                                : `<span class="text-[11px] font-semibold bg-gray-100 text-gray-500 px-3 py-1 rounded-full">Lagi disewa</span>`
                            }
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function selectVehicle(id) {
            const vehicle = globalVehicles.find(v => v.vehicle_id === id);
            if(!vehicle) return;

            document.getElementById('form-vehicle-id').value = vehicle.vehicle_id;
            
            const hargaFormat = new Intl.NumberFormat('id-ID').format(vehicle.harga_per_hari);
            document.getElementById('selected-vehicle-preview').innerHTML = `
                <img src="${vehicle.foto_url}" class="w-12 h-12 rounded-lg object-cover border border-gray-200">
                <div>
                    <div class="text-xs text-gray-500 font-medium">Pilihanmu</div>
                    <div class="font-bold text-sm leading-tight">${vehicle.nama_kendaraan}</div>
                </div>
                <div class="ml-auto text-right">
                    <div class="text-[10px] text-gray-400">Harga</div>
                    <div class="font-bold text-brand text-xs">Rp${hargaFormat}</div>
                </div>
            `;

            showForm();
        }

        function showForm() {
            document.getElementById('view-catalog').classList.remove('view-active');
            document.getElementById('view-catalog').classList.add('view-hidden');
            
            document.getElementById('view-form').classList.remove('view-hidden');
            document.getElementById('view-form').classList.add('view-active');
            
            document.getElementById('header-back-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showCatalog() {
            document.getElementById('view-form').classList.remove('view-active');
            document.getElementById('view-form').classList.add('view-hidden');
            
            document.getElementById('view-catalog').classList.remove('view-hidden');
            document.getElementById('view-catalog').classList.add('view-active');
            
            document.getElementById('header-back-btn').classList.add('hidden');
        }

        function ubahJumlah(tipe, nilai) {
            const input = document.getElementById(`jumlah_${tipe}`);
            const display = document.getElementById(`jumlah_${tipe}_display`);
            let current = parseInt(input.value) || 0;
            let newVal = current + nilai;
            if (newVal < 0) newVal = 0; 
            
            input.value = newVal;
            display.innerText = newVal;
        }

        async function submitBooking(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span>Menyiapkan Data...</span>`;
            btn.disabled = true;

            const payload = {
                action: 'insert_book',
                tenant_id: globalTenant.tenant_id || globalTenant.id,
                vehicle_id: document.getElementById('form-vehicle-id').value,
                booking_id: 'BK-' + Date.now(),
                waktu_mulai: document.getElementById('waktu_mulai').value,
                waktu_selesai: document.getElementById('waktu_selesai').value,
                alamat_antar: document.getElementById('alamat_antar').value,
                nama_lengkap: document.getElementById('nama_lengkap').value,
                no_wa_customer: document.getElementById('no_wa_customer').value,
                akun_sosmed: document.getElementById('akun_sosmed').value,
                pekerjaan: document.getElementById('pekerjaan').value,
                no_darurat: document.getElementById('no_darurat').value,
                jumlah_helm: document.getElementById('jumlah_helm').value,
                alamat_jemput: document.getElementById('alamat_antar').value,
                jumlah_jashujan: 1, 
                dokumen_jaminan: 'KTP (Kirim via WA)',
                tujuan_penggunaan: 'Jalan-jalan'
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const noWaOwner = globalTenant.no_wa_owner.replace(/^0/, '62');
                const vehicleName = globalVehicles.find(v => v.vehicle_id === payload.vehicle_id).nama_kendaraan;
                
                const waText = `Halo admin *${globalTenant.nama_rental}*, saya mau sewa unit ini:\n\n` +
                               `🏍️ *Unit:* ${vehicleName}\n` +
                               `📅 *Mulai:* ${payload.waktu_mulai.replace('T', ' ')}\n` +
                               `📅 *Selesai:* ${payload.waktu_selesai.replace('T', ' ')}\n` +
                               `📍 *Antar ke:* ${payload.alamat_antar}\n\n` +
                               `Data diri saya (Nama: ${payload.nama_lengkap}) sudah diisi di aplikasi. Ini foto KTP saya untuk jaminan...`;

                const waUrl = `https://wa.me/${noWaOwner}?text=${encodeURIComponent(waText)}`;
                
                window.location.href = waUrl;

            } catch (error) {
                console.error("Gagal Booking:", error);
                alert("Yah, koneksi terputus. Coba klik Lanjut lagi ya.");
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
            }
        }

        init();
    </script>
</body>
</html>
