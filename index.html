<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Mitra | RentalinBy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: '#FF5A00' } } }
        }
    </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans text-gray-900 antialiased p-5">

    <div class="bg-white p-8 rounded-3xl shadow-xl shadow-gray-200/50 border border-gray-100 w-full max-w-sm text-center">
        <div class="w-16 h-16 bg-gray-50 border border-gray-100 rounded-2xl mx-auto flex items-center justify-center mb-5">
            <span class="text-3xl">🔑</span>
        </div>
        <h1 class="text-2xl font-bold tracking-tight mb-1">Login Mitra</h1>
        <p class="text-xs text-gray-500 mb-6">Masukkan ID Tenant untuk mengakses garasi.</p>

        <form onsubmit="masukDashboard(event)" class="space-y-4">
            <input type="text" id="tenant-input" required placeholder="Contoh: mototest" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand font-medium text-center">
            
            <button type="submit" class="w-full bg-black text-white font-bold py-3.5 rounded-xl active:scale-95 transition-transform shadow-md">
                Buka Dashboard
            </button>
        </form>
    </div>

    <script>
        function masukDashboard(e) {
            e.preventDefault();
            const tenantId = document.getElementById('tenant-input').value.trim().toLowerCase();
            if(tenantId) {
                // Lempar ke file owner dengan parameter URL
                window.location.href = `owner-test.html?tenant=${tenantId}`;
            }
        }
    </script>
</body>
</html>
