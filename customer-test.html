<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sewa Kendaraan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#FF5A00' } } } }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; background-color: #f5f5f7; }
        .step-section { display: none; } .step-section.active { display: block; }
    </style>
</head>
<body class="text-gray-900 antialiased min-h-screen">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl relative flex flex-col">
        
        <header class="sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-gray-100 px-5 py-4 flex items-center gap-3">
            <button id="btn-back" onclick="handleBack()" class="hidden p-2 -ml-2 hover:bg-gray-100 rounded-full">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <img id="cust-logo" src="" class="w-9 h-9 rounded-full bg-gray-100 hidden">
            <div>
                <h1 id="cust-title" class="font-bold text-[15px] leading-none">Loading...</h1>
                <p id="cust-bio" class="text-[11px] text-gray-500 mt-0.5">Menghubungkan...</p>
            </div>
        </header>

        <div id="loading-indicator" class="text-center py-20 flex-1">Memuat Garasi...</div>
        <div id="error-message" class="hidden m-5 text-center py-6 text-red-500 bg-red-50 rounded-xl text-sm font-medium"></div>

        <main class="flex-1 overflow-y-auto pb-32">
            <div id="catalog-section" class="hidden p-5 space-y-4">
                <input type="text" id="search-armada" oninput="renderCatalog()" placeholder="Cari kendaraan..." class="w-full bg-gray-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand">
                <div class="flex gap-2 text-xs font-bold">
                    <button onclick="setCat('Semua')" id="pill-Semua" class="px-4 py-2 rounded-full bg-black text-white">🏢 Semua</button>
                    <button onclick="setCat('Motor')" id="pill-Motor" class="px-4 py-2 rounded-full bg-gray-100 text-gray-600">🏍️ Motor</button>
                    <button onclick="setCat('Mobil')" id="pill-Mobil" class="px-4 py-2 rounded-full bg-gray-100 text-gray-600">🚗 Mobil</button>
                </div>
                <div id="vehicle-list" class="space-y-4 pt-2"></div>
            </div>

            <div id="form-section" class="hidden">
                <div class="px-5 pt-4 pb-2 text-[10px] font-bold text-gray-400 uppercase flex justify-between">
                    <span id="step-indicator-text">Langkah 1 dari 3</span><span id="step-title-text" class="text-brand">Waktu</span>
                </div>
                <div class="px-5 mb-4"><div id="selected-vehicle-preview" class="p-3 bg-gray-50 rounded-xl border border-gray-100 flex items-center gap-3"></div></div>
                
                <form id="booking-form" class="px-5 space-y-5">
                    <input type="hidden" id="form-vehicle-id">
                    
                    <div id="step-1" class="step-section active space-y-4">
                        <h2 class="text-xl font-bold">Waktu Sewa</h2>
                        <input type="datetime-local" id="waktu_mulai" required onchange="calc()" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm">
                        <div class="flex gap-2"><button type="button" onclick="addD(1)" class="px-3 py-1 bg-gray-100 rounded text-xs">+1 Hari</button><button type="button" onclick="addD(2)" class="px-3 py-1 bg-gray-100 rounded text-xs">+2 Hari</button></div>
                        <input type="datetime-local" id="waktu_selesai" required onchange="calc()" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm">
                        <div class="flex justify-between p-3 bg-gray-50 rounded-xl"><span class="text-sm font-bold">Jml Helm</span><div class="flex gap-2 items-center"><button type="button" onclick="ubahH(-1)" class="w-6 h-6 bg-white border rounded">-</button><span id="hj">2</span><button type="button" onclick="ubahH(1)" class="w-6 h-6 bg-white border rounded">+</button></div></div>
                    </div>

                    <div id="step-2" class="step-section space-y-4">
                        <h2 class="text-xl font-bold">Lokasi Pengantaran</h2>
                        <select id="alamat_drop" onchange="toggleA()" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold"><option value="Share Lokasi via WA">📍 Share via WA</option><option value="manual">✍️ Ketik Manual</option></select>
                        <textarea id="alamat_man" rows="3" class="hidden w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm" placeholder="Detail Lokasi"></textarea>
                    </div>

                    <div id="step-3" class="step-section space-y-4">
                        <h2 class="text-xl font-bold">Data Diri</h2>
                        <div id="mini-struk" class="p-3 bg-gray-50 border rounded-xl text-xs space-y-1"></div>
                        <input type="text" id="nama" required placeholder="Nama Lengkap" class="w-full border rounded-xl px-4 py-3 text-sm">
                        <input type="tel" id="wa" required placeholder="No WhatsApp (08xxx)" class="w-full border rounded-xl px-4 py-3 text-sm">
                        <input type="text" id="ig" placeholder="@Username IG" class="w-full border rounded-xl px-4 py-3 text-sm">
                        <input type="text" id="kerja" placeholder="Pekerjaan" class="w-full border rounded-xl px-4 py-3 text-sm">
                        <input type="tel" id="darurat" placeholder="No Darurat (Teman/Keluarga)" class="w-full border rounded-xl px-4 py-3 text-sm">
                    </div>
                </form>
            </div>
        </main>

        <div id="footer-nav" class="hidden fixed bottom-0 left-0 right-0 bg-white/90 border-t p-5 max-w-md mx-auto">
            <div id="price-div" class="hidden justify-between mb-3"><span class="text-sm font-bold text-gray-500">Total</span><span id="price-txt" class="text-xl font-bold text-brand">Rp0</span></div>
            <div class="flex gap-2">
                <button id="bp" onclick="nav(-1)" class="hidden w-1/3 bg-gray-100 rounded-xl font-bold">Kembali</button>
                <button id="bn" onclick="nav(1)" class="flex-1 bg-black text-white rounded-xl py-3.5 font-bold">Lanjut</button>
                <button id="bs" onclick="sub()" class="hidden flex-1 bg-brand text-white rounded-xl py-3.5 font-bold">Booking WA</button>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/beuna-vr-api';
        
        // AMBIL TENANT ID DARI URL (Wajib!)
        const urlParams = new URLSearchParams(window.location.search);
        const TENANT_ID = urlParams.get('tenant');

        if (!TENANT_ID) {
            document.body.innerHTML = '<div style="padding:40px; text-align:center;"><h2>Link Tidak Valid</h2><p>Pastikan Anda membuka link yang benar dari admin rental.</p></div>';
            throw new Error("No Tenant");
        }

        let gt = {}, gv = [], sv = {}, cvp = 0, step = 1, cf = 'Semua', hv = 2;

        window.onload = async () => {
            document.getElementById('waktu_mulai').min = new Date().toISOString().slice(0, 16);
            try {
                // FETCH MENGGUNAKAN TENANT_ID DINAMIS
                const res = await fetch(WEBHOOK_URL, { method: 'POST', body: JSON.stringify({action: 'get', subdomain: TENANT_ID}) });
                let d = await res.json(); d = Array.isArray(d) ? d[0] : d; if(d.json) d = d.json;
                gt = d.data.tenant; gv = d.data.vehicles || [];
                document.getElementById('cust-title').innerText = gt.nama_rental;
                document.getElementById('cust-logo').src = gt.logo_url || 'https://placehold.co/100'; document.getElementById('cust-logo').classList.remove('hidden');
                renderCatalog(); document.getElementById('loading-indicator').classList.add('hidden'); document.getElementById('catalog-section').classList.remove('hidden');
            } catch(e) { document.getElementById('loading-indicator').innerText = "Gagal memuat garasi."; }
        }

        function setCat(c) { cf = c; ['Semua','Motor','Mobil'].forEach(x => document.getElementById('pill-'+x).className = x===c?"px-4 py-2 rounded-full bg-black text-white":"px-4 py-2 rounded-full bg-gray-100 text-gray-600"); renderCatalog(); }

        function renderCatalog() {
            const list = document.getElementById('vehicle-list'), q = document.getElementById('search-armada').value.toLowerCase(); list.innerHTML = '';
            let f = gv.filter(v => (v.nama_kendaraan||"").toLowerCase().includes(q) && (cf==='Semua' || (v.tipe_kendaraan||"").includes(cf)));
            if(!f.length) return list.innerHTML = '<p class="text-center py-5 text-gray-400">Kosong</p>';
            f.forEach(v => {
                const a = String(v.is_available)==="true" || String(v.is_available)==="1";
                list.innerHTML += `<div onclick="${a?`openF('${v.vehicle_id}')`:''}" class="p-3 flex gap-3 border rounded-xl mb-3 ${a?'bg-white':'bg-gray-50 opacity-50'}"><img src="${v.foto_url||'https://placehold.co/100'}" class="w-20 h-20 rounded-lg object-cover"><div class="flex-1"><h3 class="font-bold">${v.nama_kendaraan}</h3><p class="text-brand font-bold text-sm">Rp${new Intl.NumberFormat('id').format(v.harga_per_hari)}<span class="text-xs text-gray-400">/hr</span></p><div class="mt-2">${a?'<span class="px-3 py-1 bg-black text-white text-xs rounded-full">Pilih</span>':'<span class="px-3 py-1 bg-gray-200 text-xs rounded-full">Disewa</span>'}</div></div></div>`;
            });
        }

        function openF(id) {
            sv = gv.find(v => v.vehicle_id === id); cvp = sv.harga_per_hari;
            document.getElementById('form-vehicle-id').value = id;
            document.getElementById('selected-vehicle-preview').innerHTML = `<img src="${sv.foto_url||'https://placehold.co/100'}" class="w-12 h-12 rounded"><div class="font-bold">${sv.nama_kendaraan}<br><span class="text-brand text-xs">Rp${new Intl.NumberFormat('id').format(cvp)}</span></div>`;
            document.getElementById('catalog-section').classList.add('hidden'); document.getElementById('form-section').classList.remove('hidden'); document.getElementById('footer-nav').classList.remove('hidden'); document.getElementById('btn-back').classList.remove('hidden'); step = 1; upUI();
        }

        function handleBack() { if(step>1) nav(-1); else { document.getElementById('form-section').classList.add('hidden'); document.getElementById('footer-nav').classList.add('hidden'); document.getElementById('catalog-section').classList.remove('hidden'); document.getElementById('btn-back').classList.add('hidden'); } }
        function nav(d) { if(d===1 && step===1 && (!document.getElementById('waktu_mulai').value || !document.getElementById('waktu_selesai').value)) return alert("Isi waktu!"); step+=d; upUI(); }
        function upUI() {
            document.querySelectorAll('.step-section').forEach(e => e.classList.remove('active')); document.getElementById('step-'+step).classList.add('active');
            document.getElementById('bp').classList.toggle('hidden', step===1); document.getElementById('bn').classList.toggle('hidden', step===3); document.getElementById('bs').classList.toggle('hidden', step<3);
            if(step===3) {
                const d1 = new Date(document.getElementById('waktu_mulai').value), d2 = new Date(document.getElementById('waktu_selesai').value);
                const ds = Math.ceil((d2-d1)/(864e5))||1, tot = ds*cvp;
                document.getElementById('mini-struk').innerHTML = `<b>${sv.nama_kendaraan}</b> (${ds} Hr)<br>Total: Rp${new Intl.NumberFormat('id').format(tot)}<br>Fasilitas: ${hv} Helm`;
            }
        }
        function addD(n) { let s = document.getElementById('waktu_mulai').value; if(!s) s = new Date().toISOString().slice(0,16); let d = new Date(s); d.setDate(d.getDate()+n); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); document.getElementById('waktu_selesai').value = d.toISOString().slice(0,16); document.getElementById('waktu_mulai').value=s; calc(); }
        function calc() { let d1 = new Date(document.getElementById('waktu_mulai').value), d2 = new Date(document.getElementById('waktu_selesai').value); if(d1&&d2&&d2>d1){ document.getElementById('price-txt').innerText = 'Rp'+new Intl.NumberFormat('id').format(Math.ceil((d2-d1)/864e5)*cvp); document.getElementById('price-div').classList.remove('hidden'); document.getElementById('price-div').classList.add('flex'); } }
        function ubahH(n) { hv = Math.max(0, hv+n); document.getElementById('hj').innerText = hv; }
        function toggleA() { document.getElementById('alamat_man').classList.toggle('hidden', document.getElementById('alamat_drop').value !== 'manual'); }

        async function sub() {
            const n = document.getElementById('nama').value, w = document.getElementById('wa').value; if(!n||!w) return alert("Nama & WA wajib!");
            document.getElementById('bs').innerText = "Memproses...";
            const a = document.getElementById('alamat_drop').value === 'manual' ? document.getElementById('alamat_man').value : document.getElementById('alamat_drop').value;
            const p = { action: 'insert_book', tenant_id: TENANT_ID, vehicle_id: sv.vehicle_id, booking_id: 'BK-'+Date.now(), waktu_mulai: document.getElementById('waktu_mulai').value, waktu_selesai: document.getElementById('waktu_selesai').value, alamat_antar: a, nama_lengkap: n, no_wa_customer: w.replace(/\D/g,''), akun_sosmed: document.getElementById('ig').value, pekerjaan: document.getElementById('kerja').value, no_darurat: document.getElementById('darurat').value.replace(/\D/g,''), jumlah_helm: hv, dokumen_jaminan: 'Menyusul via WA' };
            try {
                await fetch(WEBHOOK_URL, {method:'POST', body: JSON.stringify(p)});
                let ow = gt.no_wa_owner.startsWith('0') ? '62'+gt.no_wa_owner.slice(1) : gt.no_wa_owner;
                window.location.href = `https://wa.me/${ow}?text=Halo admin ${gt.nama_rental}, saya mau sewa ${sv.nama_kendaraan} dari ${p.waktu_mulai} s/d ${p.waktu_selesai}. Lokasi: ${a}. Data diri atas nama ${n} sudah masuk sistem.`;
            } catch(e) { alert("Gagal konek"); document.getElementById('bs').innerText = "Coba Lagi"; }
        }
    </script>
</body>
</html>
